<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in to Luni</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8e8f0;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #7c6af7 0%, #5b8bf5 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      letter-spacing: -1px;
    }

    .logo-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .heading {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subheading {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .context-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #7c6af7;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .context-badge svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      background: #0d0d15;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      color: #e8e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #7c6af7;
    }

    input::placeholder { color: #444; }

    .error-box {
      background: #1a0d0d;
      border: 1px solid #4a1a1a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #f08080;
      margin-bottom: 18px;
      display: none;
    }

    .error-box.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c6af7 0%, #5b8bf5 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.1px;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: #1e1e2e;
      margin: 28px 0;
    }

    .privacy-note {
      font-size: 12px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    .privacy-note a {
      color: #7c6af7;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">L</div>
      <span class="logo-name">Luni</span>
    </div>

    <div class="context-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      Connecting to Claude
    </div>

    <h1 class="heading">Sign in to Luni</h1>
    <p class="subheading">Claude is requesting access to your Luni account. Sign in to allow it to see only your financial data.</p>

    <div class="error-box __ERROR_CLASS__" id="errorBox">__ERROR__</div>

    <form method="POST" action="/oauth/login" id="loginForm">
      <input type="hidden" name="client_id"      value="__CLIENT_ID__" />
      <input type="hidden" name="redirect_uri"   value="__REDIRECT_URI__" />
      <input type="hidden" name="state"          value="__STATE__" />
      <input type="hidden" name="code_challenge" value="__CODE_CHALLENGE__" />
      <input type="hidden" name="scope"          value="__SCOPE__" />

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Sign in &amp; Connect</button>
    </form>

    <div class="divider"></div>

    <p class="privacy-note">
      Only your transactions, budgets, and account data will be shared — nothing else.<br/>
      <a href="https://luni.ca/privacy" target="_blank">Privacy policy</a>
    </p>
  </div>

  <script>
    // Show error box if server injected an error message
    const errorBox = document.getElementById('errorBox');
    if (errorBox && errorBox.textContent.trim().length > 0 && !errorBox.textContent.includes('__ERROR__')) {
      errorBox.classList.add('visible');
    }

    // Disable button while submitting
    document.getElementById('loginForm').addEventListener('submit', () => {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
    });
  </script>
</body>
</html>
